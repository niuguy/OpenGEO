services:
  postgres:
    image: postgres:16-alpine
    container_name: local-ai-visibility-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: local_ai
      POSTGRES_PASSWORD: local_ai
      POSTGRES_DB: local_ai_visibility
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local_ai -d local_ai_visibility"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: local-ai-visibility-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
