# `docker compose up -d --build` starts the full stack: Postgres, Redis,
# one-shot migrations, the Next.js app on :3000, and the BullMQ worker.
# Provider keys (OPENAI_API_KEY, ...) are read from .env if present; the
# in-network DATABASE_URL/REDIS_URL below override the localhost values there.
#
# Dev mode (pnpm dev + pnpm worker on the host) still works with just:
#   docker compose up -d postgres redis

x-app-base: &app-base
  build: .
  image: opengeo:local
  env_file:
    - path: .env
      required: false
  environment:
    DATABASE_URL: postgresql://local_ai:local_ai@postgres:5432/local_ai_visibility?schema=public
    REDIS_URL: redis://redis:6379

services:
  postgres:
    image: postgres:16-alpine
    container_name: local-ai-visibility-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: local_ai
      POSTGRES_PASSWORD: local_ai
      POSTGRES_DB: local_ai_visibility
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local_ai -d local_ai_visibility"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: local-ai-visibility-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    <<: *app-base
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    <<: *app-base
    command: ["pnpm", "start"]
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    <<: *app-base
    command: ["pnpm", "worker"]
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
